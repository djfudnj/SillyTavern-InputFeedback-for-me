<!-- You might want to add additional HTML elements to ST.
    It's good practice to separate it out from your code -->
<div class="input-feedback-extension-settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b data-i18n="Input Feedback">Input Feedback</b>
      <div
        class="inline-drawer-icon fa-solid fa-circle-chevron-down down"
      ></div>
    </div>
    <div class="inline-drawer-content">
      <div class="input-feedback-extension_block flex-container">
        <input id="input-feedback-enabled" type="checkbox" />
        <label for="input-feedback-enabled" data-i18n="Enabled">Enabled</label>
      </div>

      <div class="input-feedback-extension_block flex-container">
        <input id="input-feedback-auto-new" type="checkbox" />
        <label
          for="input-feedback-auto-new"
          data-i18n="Auto feedback for new messages"
          >Auto feedback for new messages</label
        >
      </div>

      <div class="input-feedback-extension_block flex-container">
        <input id="input-feedback-auto-edit" type="checkbox" />
        <label
          for="input-feedback-auto-edit"
          data-i18n="Auto feedback for edited messages"
          >Auto feedback for edited messages</label
        >
      </div>

      <div class="input-feedback-extension_block flex-container">
        <input id="input-feedback-folded" type="checkbox" />
        <label for="input-feedback-folded" data-i18n="Fold feedback by default"
          >Fold feedback by default</label
        >
      </div>

      <div class="input-feedback-extension_block flex-container">
        <div
          class="justifyspacebetween alignitemscenter input-feedback-setting-title"
        >
          <span class="flex1" data-i18n="Template">Template</span>
        </div>
        <textarea
          id="input-feedback-template"
          class="text_pole textarea_compact"
          rows="6"
          data-i18n="[placeholder]The feedback request will be sent to AI in this format."
          placeholder="The feedback request will be sent to AI in this format."
        ></textarea>
        <small data-i18n="input-feedback-template-tips"
          >Make sure <code>{{previousMessages}}</code>,
          <code>{{message}}</code> and <code>{{prompt}}</code> are in the
          template.</small
        >
      </div>

      <div class="input-feedback-extension_block flex-container">
        <div
          class="justifyspacebetween alignitemscenter input-feedback-setting-title"
        >
          <span class="flex1" data-i18n="Prompt">Prompt</span>
        </div>
        <textarea
          id="input-feedback-prompt"
          class="text_pole textarea_compact"
          rows="6"
          data-i18n="[placeholder]This prompt will be sent to AI to request for the input feedback."
          placeholder="This prompt will be sent to AI to request for the input feedback."
        ></textarea>
      </div>

      <div class="input-feedback-extension_block flex-container">
        <label
          for="input-feedback-num-prev-msgs"
          class="title_restorable input-feedback-setting-title"
        >
          <span>
            <span data-i18n="input-feedback-num-prev-msgs-1"
              >Request input feedback along with</span
            >
            <span id="input-feedback-num-prev-msgs_value"></span
            ><span data-i18n="input-feedback-num-prev-msgs-2">
              previous messages.</span
            >
          </span>
        </label>
        <input
          id="input-feedback-num-prev-msgs"
          type="range"
          min="0"
          max="20"
          step="1"
        />
      </div>

      <br />

      <!-- ============== API 설정 ============== -->
      <div class="input-feedback-extension_block flex-container flexFlowColumn">
        <label for="input-feedback-provider" data-i18n="API Provider">
          API Provider
        </label>
        <select id="input-feedback-provider" class="text_pole">
          <option value="main">Main API (현재 연결된 API 사용)</option>
          <option value="vertexai">Google Vertex AI</option>
          <option value="makersuite">Google AI Studio</option>
          <option value="openai">OpenAI</option>
          <option value="claude">Anthropic Claude</option>
          <option value="openrouter">OpenRouter</option>
        </select>
      </div>

      <div id="input-feedback-direct-settings" class="input-feedback-extension_block flex-container flexFlowColumn" style="display:none;">
        <label for="input-feedback-model" data-i18n="Model">
          Model
        </label>
        <input
          id="input-feedback-model"
          class="text_pole"
          type="text"
          placeholder="예: gemini-2.5-flash"
        />
      </div>

      <div class="input-feedback-extension_block flex-container flexFlowColumn">
        <label for="input-feedback-max-tokens" data-i18n="Max Tokens">
          Max Tokens
        </label>
        <input
          id="input-feedback-max-tokens"
          class="text_pole"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          placeholder="예: 8192 (권장: 20000 이상)"
        />
      </div>
      <!-- ============== API 설정 끝 ============== -->

      <div
        class="input-feedback-extension_block flex-container input-feedback-button-container"
      >
        <input
          id="input-feedback-purge"
          class="menu_button"
          type="button"
          data-i18n="[value]Purge all feedbacks"
          value="Purge all feedbacks"
        />
      </div>
    </div>
  </div>
</div>
